name: Build and Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmake_preset: vs2022
            build_preset: vs2022-release
            config: Release
          - os: macos-latest
            cmake_preset: ninja-release
            build_preset: ninja-release
            config: Release

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake --preset ${{ matrix.cmake_preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }}

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

      - name: Download pluginval
        shell: bash
        run: |
          curl -LO "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_${{ runner.os }}.zip"
          unzip -q "pluginval_${{ runner.os }}.zip"
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "PLUGINVAL_BIN=./pluginval.app/Contents/MacOS/pluginval" >> "$GITHUB_ENV"
          else
            echo "PLUGINVAL_BIN=./pluginval.exe" >> "$GITHUB_ENV"
          fi

      - name: Validate VST3 (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PLUG=$(find build -type d -name "Backrooms Muffler.vst3" | head -1)
          test -n "$PLUG"
          chmod +x "$PLUGINVAL_BIN"
          "$PLUGINVAL_BIN" --strictness-level 5 --skip-gui-tests --validate "$PLUG"

      - name: Validate VST3 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $plug = Get-ChildItem build -Recurse -Directory -Filter "Backrooms Muffler.vst3" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $plug) { throw "VST3 bundle not found" }
          & .\pluginval.exe --strictness-level 5 --skip-gui-tests --validate "$plug"

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackroomsMuffler-vst3-${{ matrix.os }}
          path: build/**/VST3/*.vst3
